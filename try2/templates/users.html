<!DOCTYPE html>
<html>
<head>
    <title>用户管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>用户管理
            <a href="{{ url_for('index') }}" class="btn btn-secondary float-end">返回主页</a>
        </h2>
        
        <!-- 新增用户表单 -->
        <form method="POST" action="/add_user" class="mb-4 p-3 bg-light rounded">
            <h4>新增用户</h4>
            <div class="row g-3">
                <div class="col-md-3">
                    <input type="text" class="form-control" name="username" placeholder="用户名" required>
                </div>
                <div class="col-md-3">
                    <input type="password" class="form-control" name="password" placeholder="密码" required>
                </div>
                <div class="col-md-3">
                    <input type="email" class="form-control" name="email" placeholder="邮箱" required>
                </div>
                <div class="col-md-3">
                    <input type="tel" class="form-control" name="phone" placeholder="电话号码" pattern="[0-9]{11}" required>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-success w-100">添加用户</button>
                </div>
            </div>
        </form>

        <!-- 用户列表表格 -->
        <form method="GET" action="/search_users" class="mb-3 p-3 bg-light rounded">
    <div class="row g-3">
        <div class="col-md-3">
            <input type="text" class="form-control" name="uid" placeholder="用户ID">
        </div>
        <div class="col-md-3">
            <input type="text" class="form-control" name="phone" placeholder="电话号码">
        </div>
        <div class="col-md-3">
            <input type="email" class="form-control" name="email" placeholder="邮箱">
        </div>
        <div class="col-md-3">
            <button type="submit" class="btn btn-primary w-100">搜索</button>
        </div>
    </div>
</form>
<table class="table table-striped table-hover table-bordered mt-3">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>邮箱</th>
                    <th>密码</th>
                    <th>手机号</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user[0] }}</td>
                    <td>{{ user[1] }}</td>
                    <td>{{ user[3] }}</td>
                    <td>{{ user[2] }}</td>
                    <!-- <td>{{ user[6] }}</td> -->
                    <td>{{ user[4] if user[4] else '未填写' }}</td>
                    <td>
                        
                        <form action="/delete_user/{{ user[0] }}" method="POST" style="display:inline;">
                            <input type="hidden" name="_method" value="DELETE">
                            <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('确定删除吗？')">删除</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
