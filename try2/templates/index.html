<!DOCTYPE html>
<html>

<head>
    <title>农产品平台</title>
    <link href="/static/css/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: "bootstrap-icons";
            src: url("/static/fonts/bootstrap-icons.woff2") format("woff2"),
                url("/static/fonts/bootstrap-icons.woff") format("woff");
        }

        body {
            background: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)),
                url('/static/background/agriculture-pattern.png') repeat;
            background-size: 150px;
            min-height: 100vh;
        }

        .dashboard {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 100, 0, 0.2);
        }

        .dashboard {
            min-height: 100vh;
            padding: 2rem;
        }

        .nav-btn {
            transition: transform 0.3s ease;
        }

        .nav-btn:hover {
            transform: scale(1.05);
        }

        /* 添加样式让图片容器内的内容居中 */
        .featured-image-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container dashboard">
        <!-- 平台介绍模块 -->
        <div class="row g-4 mb-5 bg-success bg-opacity-10 p-4 rounded-4">
            <div class="col-md-6 d-flex align-items-center">
                <div class="pe-4">
                    <h2 class="text-success mb-3">智慧农业管理平台</h2>
                    <p class="text-muted">提供从生产到销售的全流程数字化管理解决方案，助力农业现代化发展。</p>
                    <div class="d-grid gap-2 d-md-flex">
                        <span class="badge bg-success me-2"><i class="bi bi-check-circle"></i> 安全认证</span>
                        <span class="badge bg-warning text-dark"><i class="bi bi-star"></i> 优质服务</span>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="featured-image-container position-relative rounded-4"
                    style="transition: all 0.3s ease;">
                    <img src="/static/background/n1.png" class="w-25 h-25 object-fit-cover rounded-3"
                        style="filter: saturate(1.1) contrast(0.95);transform-origin: center;transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);"
                        alt="智慧农业">

                    <style>

                    </style>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-10 text-center">
                <div class="row g-4 row-cols-1">
                    <div class="col-12">
                        <div class="card border-success shadow-sm h-100 w-100">
                            <div class="card-body d-flex flex-column">
                                <div class="d-flex align-items-center mb-3">
                                    <img src="/static/background/n2.png" class="me-3"
                                        style="width: 40px; height: 40px; object-fit: contain">
                                    <h5 class="card-title mb-0 text-success">用户管理系统</h5>
                                </div>
                                <p class="card-text text-muted small mb-3">管理平台注册用户信息，维护账户权限体系</p>
                                <a href="/users" class="btn btn-lg w-100 py-2 mt-auto nav-btn"
                                    style="--bs-btn-bg:#4a8c2d;--bs-btn-border-color:#3a6d23;--bs-btn-hover-bg:#3a6d23;
                                      transition: all 0.3s ease;">
                                    <i class="bi bi-people-fill fs-4 me-2"></i>
                                    进入管理
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="card border-warning shadow-sm h-100 w-100">
                            <div class="card-body d-flex flex-column">
                                <div class="d-flex align-items-center mb-3">
                                    <img src="/static/background/n3.jpg" class="me-3"
                                        style="width: 40px; height: 40px; object-fit: contain">
                                    <h5 class="card-title mb-0 text-warning">农产品管理系统</h5>
                                </div>
                                <p class="card-text text-muted small mb-3">管理在售农产品信息，跟踪库存与销售数据</p>
                                <a href="/products" class="btn btn-lg w-100 py-2 mt-auto nav-btn"
                                    style="--bs-btn-bg:#ffd700;--bs-btn-border-color:#ccab00;--bs-btn-hover-bg:#ccab00;
                                      transition: all 0.3s ease;">
                                    <i class="bi bi-basket2-fill fs-4 me-2"></i>
                                    进入管理
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="card border-info shadow-sm h-100 w-100">
                            <div class="card-body d-flex flex-column">
                                <div class="d-flex align-items-center mb-3">
                                    <img src="/static/background/n4.png" class="me-3"
                                        style="width: 40px; height: 40px; object-fit: contain">
                                    <h5 class="card-title mb-0 text-info">服务器监控系统</h5>
                                </div>
                                <p class="card-text text-muted small mb-3">实时监控平台运行状态，保障系统稳定性</p>
                                <a href="/server_monitor" class="btn btn-lg w-100 py-2 mt-auto nav-btn"
                                    style="--bs-btn-bg:#38d810;--bs-btn-border-color:#38d810;--bs-btn-hover-bg:#28a745;
                                      transition: all 0.3s ease;">
                                    <i class="bi bi-graph-up-arrow fs-4 me-2"></i>
                                    进入监控
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
