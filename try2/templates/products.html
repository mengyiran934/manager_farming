<!DOCTYPE html>
<html>
<head>
    <title>农产品管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>商品列表
            <a href="{{ url_for('index') }}" class="btn btn-secondary float-end">返回主页</a>
        </h2>
<form method="GET" action="/search_products" class="mb-3 p-3 bg-light rounded">
    <div class="row g-3">
        <div class="col-md-4">
            <input type="text" class="form-control" name="seller" placeholder="卖家UID或用户名">
        </div>
        <div class="col-md-4">
            <input type="text" class="form-control" name="price" placeholder="价格（数字或条件如<100）">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">搜索</button>
        </div>
    </div>
</form>

        <!-- 新增农产品表单 -->
        <form method="POST" action="{{ url_for('add_product') }}" enctype="multipart/form-data" class="mb-4 p-3 bg-light rounded">
            <h4>新增农产品</h4>
            <div class="row g-3">
                <div class="col-md-3">
                    <input type="number" class="form-control" name="seller_uid" placeholder="卖家UID" required>
                </div>
                <div class="col-md-3">
                    <input type="number" step="0.01" class="form-control" name="price" placeholder="价格" required>
                </div>
                <div class="col-md-3">
                    <input type="text" class="form-control" name="origin" placeholder="产地" required>
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="product_type" required>
                        <option value="">选择品类</option>
                        <option>蔬菜</option>
                        <option>谷物</option>
                        <option>水果</option>
                        <option>肉类</option>
                        <option>海鲜</option>
                        <option>调料</option>
                        <option>饮品</option>
                        <option>零食</option>
                        <option>速食</option>
                        <option>乳制品</option>
                        <option>冷冻食品</option>
                        <option>其他</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="file" class="form-control" name="image" accept="image/*" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-success w-100">添加商品</button>
                </div>
            </div>
        </form>

        <!-- 农产品列表表格 -->
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>商品ID</th>
                    <th>卖家</th>
                    <th>价格</th>
                    <th>品类</th>
                    <th>产地</th>
                    <th>图片</th>
                    <th>销量</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for product in products %}
                <tr>
                    <td>{{ product[0] }}</td>
                    <td>{{ product[1] }}</td>
                    <td>{{ product[2] }}元</td>
                    <td>{{ product[3] }}</td>
                    <td>{{ product[4] }}</td>
                    <td>{% if product[6] %}<img src="{{ url_for('static', filename=product[6]) }}" style="width:100px;height:100px;object-fit:cover;">{% else %}暂无图片{% endif %}</td>
                    <td>{{ product[5] }}</td>
                    <td>
                        <a href="/delete_product/{{ product[0] }}" class="btn btn-danger btn-sm" onclick="return confirm('确定删除吗？')">删除</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% if error %}
    <script>
        alert('错误: {{ error }}');
    </script>
    {% endif %}
</body>
</html>
